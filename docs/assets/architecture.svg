<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise Policy RAG Architecture</title>
  <desc id="desc">React UI calls FastAPI services for retrieval, fake answer generation, metrics, and eval. Providers isolate AI calls and repositories isolate in-memory or PostgreSQL storage.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7f8; }
      .box { fill: #ffffff; stroke: #d7e0e2; stroke-width: 2; rx: 8; }
      .group { fill: #eef3f4; stroke: #d7e0e2; stroke-width: 2; rx: 8; }
      .title { fill: #162326; font: 700 24px Arial, sans-serif; }
      .label { fill: #162326; font: 700 16px Arial, sans-serif; }
      .text { fill: #5d6f75; font: 13px Arial, sans-serif; }
      .accent { fill: #0f766e; }
      .line { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="760"/>
  <text class="title" x="48" y="56">Enterprise Policy RAG</text>
  <text class="text" x="48" y="82">Permission-aware retrieval, cited fake answers, operations metrics, and eval without API keys</text>

  <rect class="group" x="48" y="120" width="260" height="520"/>
  <text class="label" x="74" y="154">React / Vite UI</text>
  <rect class="box" x="74" y="184" width="208" height="62"/>
  <text class="label" x="94" y="213">Search Console</text>
  <text class="text" x="94" y="234">answer + evidence</text>
  <rect class="box" x="74" y="266" width="208" height="62"/>
  <text class="label" x="94" y="295">Knowledge Library</text>
  <text class="text" x="94" y="316">documents + chunks</text>
  <rect class="box" x="74" y="348" width="208" height="62"/>
  <text class="label" x="94" y="377">Retrieval Lab</text>
  <text class="text" x="94" y="398">top-k + threshold</text>
  <rect class="box" x="74" y="430" width="208" height="62"/>
  <text class="label" x="94" y="459">Operations</text>
  <text class="text" x="94" y="480">metrics + evidence</text>

  <rect class="group" x="380" y="120" width="260" height="520"/>
  <text class="label" x="406" y="154">FastAPI Surface</text>
  <rect class="box" x="406" y="184" width="208" height="62"/>
  <text class="label" x="426" y="213">Documents API</text>
  <text class="text" x="426" y="234">ingest, list, detail</text>
  <rect class="box" x="406" y="266" width="208" height="62"/>
  <text class="label" x="426" y="295">Retrieval API</text>
  <text class="text" x="426" y="316">permission filter</text>
  <rect class="box" x="406" y="348" width="208" height="62"/>
  <text class="label" x="426" y="377">Answer API</text>
  <text class="text" x="426" y="398">citations + refusal</text>
  <rect class="box" x="406" y="430" width="208" height="62"/>
  <text class="label" x="426" y="459">Metrics / Eval API</text>
  <text class="text" x="426" y="480">query log + evidence</text>

  <rect class="group" x="712" y="120" width="240" height="520"/>
  <text class="label" x="738" y="154">Application Services</text>
  <rect class="box" x="738" y="184" width="188" height="62"/>
  <text class="label" x="758" y="213">Document Service</text>
  <text class="text" x="758" y="234">chunk + embed</text>
  <rect class="box" x="738" y="266" width="188" height="62"/>
  <text class="label" x="758" y="295">Retrieval Service</text>
  <text class="text" x="758" y="316">rank + access reason</text>
  <rect class="box" x="738" y="348" width="188" height="62"/>
  <text class="label" x="758" y="377">Answer Service</text>
  <text class="text" x="758" y="398">fake LLM + citations</text>
  <rect class="box" x="738" y="430" width="188" height="62"/>
  <text class="label" x="758" y="459">Eval Service</text>
  <text class="text" x="758" y="480">hit + coverage</text>

  <rect class="group" x="1014" y="120" width="218" height="220"/>
  <text class="label" x="1040" y="154">Providers</text>
  <rect class="box" x="1040" y="184" width="166" height="54"/>
  <text class="label" x="1058" y="216">FakeEmbedding</text>
  <rect class="box" x="1040" y="256" width="166" height="54"/>
  <text class="label" x="1058" y="288">FakeLLM</text>

  <rect class="group" x="1014" y="380" width="218" height="260"/>
  <text class="label" x="1040" y="414">Repositories</text>
  <rect class="box" x="1040" y="444" width="166" height="54"/>
  <text class="label" x="1058" y="476">In-memory</text>
  <rect class="box" x="1040" y="516" width="166" height="54"/>
  <text class="label" x="1058" y="548">PostgreSQL</text>
  <text class="text" x="1058" y="590">pgvector ready</text>

  <path class="line" d="M308 380 C338 380 350 380 380 380"/>
  <path class="line" d="M640 380 C670 380 682 380 712 380"/>
  <path class="line" d="M952 280 C982 280 990 250 1014 250"/>
  <path class="line" d="M952 470 C982 470 990 500 1014 500"/>

  <rect class="accent" x="48" y="690" width="12" height="12" rx="2"/>
  <text class="text" x="70" y="701">Default local path: in-memory repositories + fake providers. Docker path: PostgreSQL + pgvector integration test.</text>
</svg>
